# ─────────────────────────────────────────────────────────────────────────────
# Gedify — Synology SQLite v2 — version IMAGE préconstruite
# Container Manager / docker compose
#
# AVANT D'IMPORTER DANS CONTAINER MANAGER :
#
#   export SYNOLOGY_DOCKER_ROOT=/volume5/docker/gedify
#   sh deploy/synology/init-host.sh
#
# À adapter :
#   - /volume5/docker/gedify si votre volume est différent
#   - 192.168.1.17 avec l’IP réelle du NAS
#   - GEDIFY_IMAGE si l’image Docker finale a un autre nom
#
# Lancement :
#   docker compose -f docker-compose.sqlite.yml up -d
#
# Ne pas utiliser --build avec cette version.
# ─────────────────────────────────────────────────────────────────────────────

services:
  ollama:
    image: ollama/ollama:latest
    container_name: gedify-ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: "5m"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    volumes:
      - /volume5/docker/gedify/ollama:/root/.ollama
    networks:
      - gedify-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: gedify-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "qwen3:4b"
    networks:
      - gedify-net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Initialisation du modèle Ollama…"
        if ollama list | grep -q "$${OLLAMA_MODEL:-qwen3:4b}"; then
          echo "Modèle déjà présent — aucun téléchargement."
        else
          echo "Téléchargement du modèle..."
          ollama pull "$${OLLAMA_MODEL:-qwen3:4b}"
        fi
        echo "Modèle Ollama prêt."

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: gedify-onlyoffice
    restart: unless-stopped
    env_file:
      - /volume5/docker/gedify/data/onlyoffice.env
    environment:
      JWT_ENABLED: "true"
      JWT_HEADER: "Authorization"
    ports:
      - "8082:80"
    volumes:
      - /volume5/docker/gedify/onlyoffice/logs:/var/log/onlyoffice
      - /volume5/docker/gedify/onlyoffice/data:/var/www/onlyoffice/Data
      - /volume5/docker/gedify/onlyoffice/lib:/var/lib/onlyoffice
      - /volume5/docker/gedify/onlyoffice/db:/var/lib/postgresql
    networks:
      - gedify-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthcheck | grep -q true"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s

  gedify:
    image: ${GEDIFY_IMAGE:-ghcr.io/adsolutionpro/gedify:latest}
    container_name: gedify
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
    command: ["sh", "/app/deploy/synology/scripts/start-synology.sh"]
    ports:
      - "3210:3200"
    networks:
      - gedify-net
    environment:
      NODE_ENV: "production"
      PORT: "3200"
      HOSTNAME: "0.0.0.0"

      GEDIFY_RUNTIME: "docker"
      GEDIFY_DEPLOYMENT_TARGET: "synology"

      GEDIFY_STORAGE_MODE: "sqlite"
      DATA_DIR: "/app/.data"
      DATABASE_URL: "file:/app/.data/gedify.sqlite"
      ENABLE_JSON_FALLBACK: "false"

      AI_PROVIDER: "ollama"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "qwen3:4b"
      OPENAI_BASE_URL: "http://ollama:11434/v1"
      OPENAI_API_KEY: "ollama-local"
      AI_ASSISTANT_MODEL: "qwen3:4b"

      ONLYOFFICE_DOCUMENT_SERVER_URL: "http://192.168.1.17:8082"
      ONLYOFFICE_INTERNAL_URL: "http://onlyoffice"
      GEDIFY_PUBLIC_URL: "http://192.168.1.17:3210"

      COOKIE_SECURE: "false"
    volumes:
      - /volume5/docker/gedify/data:/app/.data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3200/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

networks:
  gedify-net:
    driver: bridge