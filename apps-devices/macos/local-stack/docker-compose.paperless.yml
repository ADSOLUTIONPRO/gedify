# Stack Paperless-ngx local pour « Gedify Local complète ».
# Les volumes pointent vers ~/Library/Application Support/Gedify/ (via ${GEDIFY_DATA_DIR}).
# Seul le webserver Paperless est exposé (localhost:8010). PostgreSQL / Redis / Tika /
# Gotenberg restent internes au réseau Docker.
name: gedify-paperless

services:
  broker:
    image: docker.io/library/redis:7
    restart: unless-stopped
    volumes:
      - ${GEDIFY_DATA_DIR}/redis:/data

  db:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    volumes:
      - ${GEDIFY_DATA_DIR}/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PAPERLESS_DBNAME:-paperless}
      POSTGRES_USER: ${PAPERLESS_DBUSER:-paperless}
      POSTGRES_PASSWORD: ${PAPERLESS_DBPASS:?Mot de passe PostgreSQL requis}

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.7
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  tika:
    image: docker.io/apache/tika:latest
    restart: unless-stopped

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
      - gotenberg
      - tika
    ports:
      - "127.0.0.1:${PAPERLESS_PORT:-8010}:8000"
    volumes:
      - ${GEDIFY_DATA_DIR}/paperless/data:/usr/src/paperless/data
      - ${GEDIFY_DATA_DIR}/paperless/media:/usr/src/paperless/media
      - ${GEDIFY_DATA_DIR}/paperless/export:/usr/src/paperless/export
      - ${GEDIFY_DATA_DIR}/paperless/consume:/usr/src/paperless/consume
    env_file: .env
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
