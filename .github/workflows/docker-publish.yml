# ─────────────────────────────────────────────────────────────────────────────
# Construit l'image GEDify depuis le Dockerfile et la publie sur GitHub Container
# Registry (ghcr.io). Container Manager (Synology) peut alors « pull » l'image
# SANS Dockerfile local ni build sur le NAS.
#
# Image publiée : ghcr.io/<owner-en-minuscules>/gedify
#   (owner pris automatiquement via github.repository_owner)
#   → pour ADSOLUTIONPRO : ghcr.io/adsolutionpro/gedify
#
# Déclencheurs : push sur main (tag `latest`), tags git `v*` (tag de version),
#                + déclenchement manuel. Chaque commit produit aussi un tag `sha`.
# ─────────────────────────────────────────────────────────────────────────────
name: Publier l'image GEDify (GHCR)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # L'owner est injecté automatiquement et mis en MINUSCULES par l'action
          # (GHCR exige des noms en minuscules) → ghcr.io/<owner>/gedify.
          images: ghcr.io/${{ github.repository_owner }}/gedify
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Synology Container Manager = x86_64. (Ajoutez linux/arm64 au besoin.)
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
